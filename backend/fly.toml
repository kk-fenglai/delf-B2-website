# Fly.io config for delfluent-backend.
# Region: sin (Singapore) — hkg deprecated on Fly; closest Asia-Pacific alternative.
# Adjust app name + region after `fly launch` if you pick something different.

app = "delf-b2-website"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "4000"
  # Run the in-process essay/oral grading + payment-reconcile workers on this
  # (single, always-on) machine. Without this the queues never drain — essays
  # sit at status='queued' forever and the UI shows the "service busy" warning.
  RUN_BG_WORKERS = "true"

[http_service]
  internal_port = 4000
  force_https = true
  # Keep the machine warm. The essayQueue + reconcile workers run in-process
  # and need a live machine; auto-stopping would orphan in-flight grading.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"

[deploy]
  # Apply Postgres migrations before the new release replaces the running
  # machine. Safe because Prisma migrations are forward-only and idempotent.
  release_command = "npx prisma migrate deploy"

# Persist user oral recordings across deploys (ephemeral root fs otherwise).
[mounts]
  source = "recordings_data"
  destination = "/app/content/recordings"
